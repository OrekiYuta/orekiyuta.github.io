name: Deploy Hexo to master

# 当 push 到 source 分支时触发；也可在 Actions 页面手动触发
on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write   # 允许用 GITHUB_TOKEN 推送到 master 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: source
          submodules: false

      - name: Setup Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Hexo clean & generate
        run: |
          npx hexo clean
          npx hexo generate

      - name: Verify generated output is not empty
        run: |
          echo "index.html size:"
          stat -c %s public/index.html
          echo "non-empty html count:"
          find public -name '*.html' -size +0c | wc -l

      - name: Deploy public/ to master branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: master
          # 强制重建 master：每次都用全新内容覆盖，避免误判“无变化”而跳过推送
          force_orphan: true
          full_commit_message: "Site updated by CI: ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
